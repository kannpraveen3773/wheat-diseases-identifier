<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">

            <!-- Digital Agronomist Label -->

        </section>
        <!-- Form Section (Bottom Split) -->
        <section
            class="flex-grow bg-surface rounded-t-[2.5rem] -mt-10 relative z-30 px-8 pt-10 pb-8 md:mt-0 md:rounded-none md:w-1/2 md:flex md:flex-col md:justify-center md:items-center overflow-y-auto">
            <div class="max-w-md w-full mx-auto">
                <header class="mb-10">

                    <div id="google_translate_element" class="ml-4 flex items-center"></div>

                <form id="loginForm" class="space-y-6">
                    <!-- Input Field: Identification -->

                        <div class="relative">

                            <span

                                data-icon="alternate_email">alternate_email</span>
                        </div>
                    </div>
                    <!-- Input Field: Password -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">

                                class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant">Password</label>

                        </div>
                        <div class="relative">

                        type="submit">

                    </button>

                <!-- Divider -->

                <!-- Secondary Actions -->

                        <span>Login with Google</span>

                    <button id="otpLoginBtn" type="button"

                <!-- Hidden OTP Section -->

                        <button id="sendOtpBtn" type="button"

                    </div>

                    <div id="otp-verify-group" class="hidden space-y-4">
                        <div class="space-y-1.5">
                            <label
                                class="font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant">Enter
                                6-digit Code</label>
                            <div class="relative">
                                <input id="otpCode"
                                    class="w-full bg-surface border-none rounded-xl p-3 text-center text-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 outline-none tracking-[0.5em] font-mono font-bold"
                                    placeholder="------" type="text" maxlength="6" />
                            </div>
                        </div>
                        <button id="verifyOtpBtn" type="button"
                            class="w-full bg-primary text-on-primary font-headline font-bold text-sm py-3 rounded-xl hover:bg-primary/90 transition-colors shadow-md active:scale-[0.98]">Verify

    <script type="text/javascript">
        function googleTranslateElementInit() {

        }

    <script type="text/javascript"
        src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.textContent = type === 'password' ? 'visibility_off' : 'visibility';
            this.setAttribute('data-icon', type === 'password' ? 'visibility_off' : 'visibility');
        });

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Keep UID if needed for UI, but token is in cookie
                    if (data.uid) localStorage.setItem('uid', data.uid);
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Login failed: ' + (data.error || 'Invalid credentials.'));
                }
            } catch (error) {
                console.error('Error during login:', error);
                alert('An error occurred during login. Is the backend running?');
            }
        });
    </script>
</body>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHIWUDjWsskbEeE3STkEdBRiP7sgyTYM0",
        authDomain: "wheat-diseases-identifier.firebaseapp.com",
        projectId: "wheat-diseases-identifier",
        storageBucket: "wheat-diseases-identifier.firebasestorage.app",
        messagingSenderId: "554172427975",
        appId: "1:554172427975:web:c5b25b5afe5245717018e2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    async function logExternalLogin(user, providerName) {
        try {
            const token = await user.getIdToken();
            if (user.uid) localStorage.setItem('uid', user.uid);
            await fetch('http://localhost:5000/api/auth/log-external-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ uid: user.uid, email: user.email, provider: providerName, token: token })
            });
        } catch (e) {
            console.error('Logging failed', e);
        }
        window.location.href = 'dashboard.html';
    }

    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            await logExternalLogin(result.user, 'google');
        } catch (error) {
            console.error(error);
            alert('Google Login failed: ' + error.message);
        }
    });

    const otpSection = document.getElementById('otp-section');
    const phoneGroup = document.getElementById('phone-input-group');
    const otpVerifyGroup = document.getElementById('otp-verify-group');

    document.getElementById('otpLoginBtn').addEventListener('click', () => {
        otpSection.classList.remove('hidden');
        if (!window.recaptchaVerifier) {
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'normal',
                'callback': (response) => { }
            });
        }
    });

    document.getElementById('closeOtpBtn').addEventListener('click', () => {
        otpSection.classList.add('hidden');
    });

    let confirmationResult = null;

    document.getElementById('sendOtpBtn').addEventListener('click', async () => {
        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        if (!phoneNumber) return alert('Enter phone number');
        if (!phoneNumber.startsWith('+')) return alert('Please include your country code, e.g., +91 for India or +1 for US. Format: +919876543210');

        try {
            confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
            phoneGroup.classList.add('hidden');
            otpVerifyGroup.classList.remove('hidden');
        } catch (error) {
            console.error(error);
            if (error.code === 'auth/operation-not-allowed') {
                alert('Firebase Phone Auth is disabled. You must enable "Phone" sign-in method in your Firebase Console -> Authentication -> Sign-in method section.');
            } else {
                alert('Failed to send OTP: ' + error.message);
            }
            if (window.recaptchaVerifier) {
                window.recaptchaVerifier.render().then(widgetId => grecaptcha.reset(widgetId));
            }
        }
    });

    document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
        const code = document.getElementById('otpCode').value;
        if (!code) return alert('Enter code');

        try {
            const result = await confirmationResult.confirm(code);
            await logExternalLogin(result.user, 'phone');
        } catch (error) {
            console.error(error);
            alert('Failed to verify OTP: ' + error.message);
        }
    });
</script>
