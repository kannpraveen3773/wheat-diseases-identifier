<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>WheatGuard - Sign In</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f8fafc", 
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f1f5f9", 
                        "on-surface": "#0f172a", 
                        "on-surface-variant": "#475569", 
                        "outline-variant": "#cbd5e1", 
                        "primary": "#10b981", 
                        "primary-container": "#d1fae5", 
                        "on-primary": "#ffffff",
                        "on-primary-container": "#064e3b", 
                        "secondary": "#334155", 
                        "error": "#ef4444", 
                        "error-container": "#fee2e2", 
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <link href="styles.css" rel="stylesheet" />
</head>

<body class="bg-surface text-on-surface min-h-screen hero-wrapper flex flex-col font-body items-center justify-center p-4">

    <!-- TopNav - Compact Auth Nav -->
    <header class="absolute top-0 w-full z-[100] flex items-center justify-between px-6 py-4">
        <a href="index.html" class="flex items-center gap-2 cursor-pointer bg-white/20 backdrop-blur-md px-4 py-2 rounded-full border border-white/30">
            <span class="text-white text-xl"><i class="fa-solid fa-seedling"></i></span>
            <span class="text-lg font-black text-white tracking-tighter">Wheat<span class="text-primary-container">Guard</span></span>
        </a>
        
        <!-- Google Translate Setup -->
        <div class="relative group" id="custom-lang-selector">
            <button class="flex items-center gap-2 bg-white/20 backdrop-blur-md px-4 py-2 hover:bg-white/30 text-white rounded-full font-bold font-label text-xs uppercase tracking-wider transition-colors border border-white/30" aria-label="Select Language">
                <i class="fa-solid fa-language text-[16px]"></i>
                <span id="current-lang-text" class="notranslate">EN</span>
                <i class="fa-solid fa-chevron-down text-[12px]"></i>
            </button>
            <div class="absolute top-full right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-outline-variant/30 overflow-hidden opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top translate-y-2 group-hover:translate-y-0 z-50">
                <ul class="py-2 flex flex-col font-label text-sm font-semibold text-on-surface-variant">
                    <li><button class="w-full text-left px-4 py-2 hover:bg-primary-container transition-colors notranslate" onclick="changeLanguage('en', 'EN')">English (EN)</button></li>
                    <li><button class="w-full text-left px-4 py-2 hover:bg-primary-container transition-colors notranslate" onclick="changeLanguage('hi', 'HI')">हिन्दी (HI)</button></li>
                    <li><button class="w-full text-left px-4 py-2 hover:bg-primary-container transition-colors notranslate" onclick="changeLanguage('ta', 'TA')">தமிழ் (TA)</button></li>
                    <li><button class="w-full text-left px-4 py-2 hover:bg-primary-container transition-colors notranslate" onclick="changeLanguage('te', 'TE')">తెలుగు (TE)</button></li>
                    <li><button class="w-full text-left px-4 py-2 hover:bg-primary-container transition-colors notranslate" onclick="changeLanguage('kn', 'KN')">ಕನ್ನಡ (KN)</button></li>
                    <li><button class="w-full text-left px-4 py-2 hover:bg-primary-container transition-colors notranslate" onclick="changeLanguage('pa', 'PA')">ਪੰਜਾਬੀ (PA)</button></li>
                </ul>
            </div>
        </div>
        <div id="google_translate_element" class="hidden"></div>
    </header>

    <main class="w-full max-w-md z-10 flex flex-col pt-16">
        
        <div class="glass-panel rounded-[2.5rem] p-8 md:p-10 shadow-2xl border border-white/40">
            <div class="text-center mb-8">
                <h2 class="font-black text-3xl text-on-surface mb-2">Welcome Back</h2>
                <p class="text-on-surface-variant font-medium text-sm">Protect your harvest with precision data.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <!-- Input: Email -->
                <div class="space-y-1.5">
                    <label class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1">Email</label>
                    <div class="relative">
                        <input id="email" class="w-full bg-white/50 backdrop-blur-sm border border-outline-variant/30 rounded-xl p-3.5 pl-4 text-sm text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/40 focus:bg-white transition-all outline-none" placeholder="agronomist@farm.com" type="email" required/>
                        <i class="fa-solid fa-envelope absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant"></i>
                    </div>
                </div>

                <!-- Input: Password -->
                <div class="space-y-1.5">
                    <div class="flex justify-between items-center ml-1">
                        <label class="font-label text-xs font-bold uppercase tracking-wider text-on-surface-variant">Password</label>
                        <a class="font-label text-[11px] font-extrabold text-primary hover:underline transition-colors uppercase tracking-tight" href="#">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <input id="password" class="w-full bg-white/50 backdrop-blur-sm border border-outline-variant/30 rounded-xl p-3.5 pl-4 text-sm text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/40 focus:bg-white transition-all outline-none" placeholder="••••••••" type="password" required/>
                        <i id="togglePassword" class="fa-solid fa-eye-slash absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant cursor-pointer hover:text-primary transition-colors"></i>
                    </div>
                </div>

                <button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-label font-bold text-sm tracking-widest uppercase p-4 mt-2 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
                    <span>Login</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="relative my-7 flex items-center justify-center">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant/30"></div>
                </div>
                <span class="relative px-4 bg-white/80 backdrop-blur text-on-surface-variant font-label text-[10px] font-bold uppercase tracking-[0.2em] rounded-full">Secure Access</span>
            </div>

            <!-- Alternative Auth Actions -->
            <div class="grid grid-cols-1 gap-3">
                <button id="googleLoginBtn" type="button" class="w-full flex items-center justify-center space-x-3 p-3.5 bg-white/60 hover:bg-white border border-outline-variant/30 rounded-xl font-label font-bold text-xs uppercase tracking-wider text-on-surface transition-colors active:scale-[0.98]">
                    <i class="fa-brands fa-google text-lg text-error"></i>
                    <span>Login with Google</span>
                </button>
                <button id="otpLoginBtn" type="button" class="w-full flex items-center justify-center space-x-3 p-3.5 bg-white/60 hover:bg-white border border-outline-variant/30 rounded-xl font-label font-bold text-xs uppercase tracking-wider text-on-surface transition-colors active:scale-[0.98]">
                    <i class="fa-solid fa-mobile-screen text-lg text-primary"></i>
                    <span>Login with Mobile OTP</span>
                </button>
            </div>

            <!-- Hidden OTP Section -->
            <div id="otp-section" class="hidden mt-6 bg-surface-container p-5 rounded-2xl border border-outline-variant/40 relative shadow-inner">
                <button id="closeOtpBtn" type="button" class="absolute top-3 right-3 text-on-surface-variant hover:text-error transition-colors cursor-pointer" aria-label="Close">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
                <h3 class="font-black text-sm text-on-surface mb-4">Phone Authentication</h3>
                
                <div id="phone-input-group" class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant">Phone Number</label>
                        <div class="relative">
                            <input id="phoneNumber" class="w-full bg-white border border-outline-variant/30 rounded-xl p-3 pl-4 text-sm text-on-surface focus:ring-2 focus:ring-primary/40 outline-none" placeholder="+1234567890" value="+911234567890" type="tel" />
                            <i class="fa-solid fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant"></i>
                        </div>
                    </div>
                    <div id="recaptcha-container" class="my-2"></div>
                    <button id="sendOtpBtn" type="button" class="w-full bg-secondary hover:bg-secondary/90 text-white font-label font-bold text-xs uppercase tracking-widest py-3 rounded-xl transition-colors shadow-sm active:scale-[0.98]">Send Security Code</button>
                </div>

                <div id="otp-verify-group" class="hidden space-y-4">
                    <div class="space-y-1.5">
                        <label class="font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant">Enter 6-digit Code</label>
                        <div class="relative">
                            <input id="otpCode" class="w-full bg-white border border-outline-variant/30 rounded-xl p-3 text-center text-lg text-on-surface focus:ring-2 focus:ring-primary/40 outline-none tracking-[0.5em] font-mono font-bold" placeholder="------" value="123456" type="text" maxlength="6" />
                        </div>
                    </div>
                    <button id="verifyOtpBtn" type="button" class="w-full bg-primary hover:bg-primary/90 text-white font-label font-bold text-xs uppercase tracking-widest py-3 rounded-xl transition-colors shadow-md active:scale-[0.98]">Verify & Login</button>
                </div>
            </div>

            <!-- Footer Context -->
            <footer class="mt-8 text-center pt-4 border-t border-outline-variant/30">
                <p class="text-on-surface-variant text-[11px] font-bold uppercase tracking-widest">
                    New to the field? 
                    <a class="text-primary font-black hover:underline decoration-2 ml-1" href="signup.html">Create Account</a>
                </p>
            </footer>
        </div>
    </main>

    <!-- JS Logic Strictly Preserved -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'hi,ta,pa,te,kn,en',
                autoDisplay: false
            }, 'google_translate_element');
        }

        function changeLanguage(langCode, btnText) {
            document.getElementById('current-lang-text').innerText = btnText;
            const selectField = document.querySelector(".goog-te-combo");
            if (selectField) {
                selectField.value = langCode;
                selectField.dispatchEvent(new Event("change"));
            }
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // Password Visibility Toggle Update to FA format
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            // Switch between FontAwesome classes
            if (type === 'password') {
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            } else {
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if(data.uid) localStorage.setItem('uid', data.uid); // Keep UID if needed for UI, but token is in cookie
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Login failed: ' + (data.error || 'Invalid credentials.'));
                }
            } catch (error) {
                console.error('Error during login:', error);
                alert('An error occurred during login. Is the backend running?');
            }
        });
    </script>

    <!-- Unchanged Firebase Auth Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHIWUDjWsskbEeE3STkEdBRiP7sgyTYM0",
            authDomain: "wheat-diseases-identifier.firebaseapp.com",
            projectId: "wheat-diseases-identifier",
            storageBucket: "wheat-diseases-identifier.firebasestorage.app",
            messagingSenderId: "554172427975",
            appId: "1:554172427975:web:c5b25b5afe5245717018e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        async function logExternalLogin(user, providerName) {
            try {
                const token = await user.getIdToken();
                if (user.uid) localStorage.setItem('uid', user.uid);
                await fetch('http://localhost:5000/api/auth/log-external-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ uid: user.uid, email: user.email, provider: providerName, token: token })
                });
            } catch (e) {
                console.error('Logging failed', e);
            }
            window.location.href = 'dashboard.html';
        }

        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                await logExternalLogin(result.user, 'google');
            } catch (error) {
                console.error(error);
                alert('Google Login failed: ' + error.message);
            }
        });

        const otpSection = document.getElementById('otp-section');
        const phoneGroup = document.getElementById('phone-input-group');
        const otpVerifyGroup = document.getElementById('otp-verify-group');

        document.getElementById('otpLoginBtn').addEventListener('click', () => {
            otpSection.classList.remove('hidden');
            if(!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                    'size': 'normal',
                    'callback': (response) => {}
                });
            }
        });

        document.getElementById('closeOtpBtn').addEventListener('click', () => {
            otpSection.classList.add('hidden');
        });

        let confirmationResult = null;

        document.getElementById('sendOtpBtn').addEventListener('click', async () => {
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            if (!phoneNumber) return alert('Enter phone number');
            if (!phoneNumber.startsWith('+')) return alert('Please include your country code, e.g., +91 for India or +1 for US.');
            
            try {
                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                phoneGroup.classList.add('hidden');
                otpVerifyGroup.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/operation-not-allowed') {
                    alert('Firebase Phone Auth is disabled. You must enable "Phone" sign-in method in your Firebase Console.');
                } else {
                    alert('Failed to send OTP: ' + error.message);
                }
                if (window.recaptchaVerifier) {
                    window.recaptchaVerifier.render().then(widgetId => grecaptcha.reset(widgetId));
                }
            }
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            const code = document.getElementById('otpCode').value;
            if (!code) return alert('Enter code');
            
            try {
                const result = await confirmationResult.confirm(code);
                await logExternalLogin(result.user, 'phone');
            } catch (error) {
                console.error(error);
                alert('Failed to verify OTP: ' + error.message);
            }
        });
    </script>
</body>
</html>
